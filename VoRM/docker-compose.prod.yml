# Test the production build locally over plain HTTP on localhost
services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    image: vorm_prod
    container_name: vorm_prod
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
    labels:
      - "traefik.http.routers.vorm.rule=Host(`localhost`)"
      - "traefik.http.routers.vorm.entrypoints=web"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vorm_net

  db:
    image: postgres:18.2
    environment:
      - PGDATA=/data
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/data
    container_name: vorm_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vorm_net

  proxy:
    image: traefik
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vorm_net

networks:
  vorm_net:
    driver: bridge

volumes:
  pg_data:
    name: vorm_pg_data_prod
